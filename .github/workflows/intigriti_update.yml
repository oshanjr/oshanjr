name: Update Intigriti Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Dependencies
        run: pip install requests

      - name: Run Update Script
        env:
          INTIGRITI_CLIENT_ID: ${{ secrets.INTIGRITI_CLIENT_ID }}
          INTIGRITI_CLIENT_SECRET: ${{ secrets.INTIGRITI_CLIENT_SECRET }}
          INTIGRITI_REFRESH_TOKEN: ${{ secrets.INTIGRITI_REFRESH_TOKEN }}
        run: python update_intigriti_stats.py
        
      - name: Commit Changes
        run: |
          git config --global user.name "oshanjr-bot"
          git config --global user.email "oshanjr@users.noreply.github.com"
          git add README.md
          git diff --quiet && git diff --staged --quiet || (git commit -m "Updated Intigriti Stats" && git push)
