name: Update Intigriti Stats

on:
  schedule:
    - cron: '0 0 * * *' # Runs every midnight
  workflow_dispatch: # Allows manual run

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
          
      - name: Install Requests
        run: pip install requests

      - name: Run Update Script
        env:
          INTIGRITI_TOKEN: ${{ secrets.INTIGRITI_TOKEN }}
        run: python update_intigriti_stats.py
        
      - name: Commit and Push
        run: |
          git config --global user.name "oshanjr-bot"
          git config --global user.email "oshanjr@users.noreply.github.com"
          git add README.md
          git commit -m "Updated Intigriti Stats" || exit 0
          git push
